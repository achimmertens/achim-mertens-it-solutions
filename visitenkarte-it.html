<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Visitenkarte – Achim Mertens IT Consulting</title>
<style>
  /* ═══ Druck-Setup ═══ */
  @page { size: 85mm 55mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 20px 0;
  }

  /* ═══ Einzelkarte ═══ */
  .card {
    width: 85mm;
    height: 55mm;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,.12);

    /* Design-System: primary → gradient wie Webseite */
    background: linear-gradient(135deg,
      oklch(0.25 0.08 255)   0%,
      oklch(0.35 0.12 235)  50%,
      oklch(0.50 0.14 210) 100%
    );
    color: #fff;
    display: flex;
    flex-direction: column;
  }

  /* Dots-Overlay (wie Hero auf it.amertens.me) */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background-image: radial-gradient(circle at 20% 20%, white 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  /* ── Header ── */
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5.5mm 5mm 0 5mm;
    position: relative;
    z-index: 1;
  }
  .card-header img {
    width: 11mm;
    height: auto;
    flex-shrink: 0;
  }
  .card-header .title-block { line-height: 1.15; }
  .card-header .name {
    font-size: 16pt;
    font-weight: 700;
    letter-spacing: -0.015em;
  }
  .card-header .subtitle {
    font-size: 8.5pt;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.75;
    margin-top: 0.5mm;
  }

  /* ── Body ── */
  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 5mm;
    position: relative;
    z-index: 1;
  }

  /* ── Kontakt ── */
  .contact {
    display: flex;
    flex-direction: column;
    gap: 0.6mm;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 2mm;
    font-size: 8pt;
    opacity: 0.95;
  }
  .contact-item .icon {
    width: 3.5mm;
    text-align: center;
    flex-shrink: 0;
    font-size: 9pt;
    opacity: 0.5;
  }

  /* ── Footer ── */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5mm 3.5mm 5mm;
    position: relative;
    z-index: 1;
  }
  .card-footer .url {
    font-size: 9pt;
    font-weight: 600;
    opacity: 0.95;
  }
  .card-footer .social {
    display: flex;
    gap: 1.5mm;
  }
  .card-footer .social a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.8mm 1.5mm;
    border-radius: 1mm;
    background: rgba(255,255,255,0.10);
    color: #fff;
    text-decoration: none;
    font-size: 7pt;
    font-weight: 700;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .card-footer .social a:hover {
    background: rgba(255,255,255,0.20);
  }

  /* ── Inline-SVG-Fallback für Logo ── */
  .logo-fallback {
    display: none;
    width: 11mm;
    height: 11mm;
    flex-shrink: 0;
  }
  .card-header img[src]:not([src=""]) + .logo-fallback { display: none; }
  .card-header img[src=""] + .logo-fallback,
  .card-header img:not([src]) + .logo-fallback { display: block; }

  /* ═══ Druckansicht ═══ */
  @media print {
    body { background: none; padding: 0; }
    .card { box-shadow: none; page-break-after: always; }
    .info-bar { display: none; }
  }

  /* ═══ Multi-Karten-Bogen (Screen) ═══ */
  #multi-view {
    display: grid;
    grid-template-columns: repeat(3, 85mm);
    grid-template-rows: repeat(3, 55mm);
    gap: 0;
    margin: 10px auto;
    background: white;
  }
  #multi-view .card { box-shadow: none; border: 0.1mm solid #ddd; }
  #multi-view .card + .card { border-left: none; }
  @media print {
    #single-view { display: none; }
    #multi-view { display: grid !important; margin: 0; }
  }
  @media screen {
    #multi-view { display: none; }
  }

  .info-bar {
    font: 11px/1.4 sans-serif;
    color: #555;
    background: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin: 10px auto;
    max-width: 500px;
    text-align: center;
  }
  .info-bar strong { color: #111; }

  /* ═══ Template (unsichtbar, für JS-Klon) ═══ */
  #card-template { display: none; }
</style>
</head>
<body>

<div class="info-bar">
  <strong>🖨️ Visitenkarte 85×55mm – IT Consulting</strong><br>
  Einzelansicht unten · Zum Drucken: <strong>Strg+P</strong> → 9 Karten pro A4-Bogen
</div>

<!-- ─── Template ─── -->
<div id="card-template">
  <div class="card">
    <div class="card-header">
      <img src="src/assets/logo.png" alt="Logo" onerror="this.style.display='none'">
      <!-- Inline-SVG-Fallback: hexagonales "A" -->
      <svg class="logo-fallback" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <defs>
          <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0.5"/>
          </linearGradient>
        </defs>
        <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="none" stroke="url(#lg)" stroke-width="6"/>
        <text x="50" y="72" text-anchor="middle" fill="url(#lg)" font-size="56" font-weight="bold" font-family="sans-serif">A</text>
      </svg>
      <script>(function(){var i=document.currentScript.previousElementSibling.previousElementSibling;if(!i||!i.complete||i.naturalWidth===0){var s=i.nextElementSibling;if(s&&s.classList.contains('logo-fallback'))s.style.display='block';}})();</script>
      <div class="title-block">
        <div class="name">Achim Mertens</div>
        <div class="subtitle">IT Consulting · Eschweiler</div>
      </div>
    </div>
    <div class="card-body">
      <div class="contact">
        <div class="contact-item">
          <span class="icon">📍</span>
          <span>Vennstr. 31, 52249 Eschweiler</span>
        </div>
        <div class="contact-item">
          <span class="icon">📞</span>
          <span>+49 1517 4412216</span>
        </div>
        <div class="contact-item">
          <span class="icon">✉️</span>
          <span>achim_mertens@gmx.de</span>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span class="url">it.amertens.me</span>
      <div class="social">
        <a href="https://linkedin.com/in/achim-mertens-97b0" title="LinkedIn">LinkedIn</a>
        <a href="https://github.com/achimmertens" title="GitHub">GitHub</a>
      </div>
    </div>
  </div>
</div>

<!-- ─── Einzelansicht ─── -->
<div id="single-view"></div>

<!-- ─── 9er-Bogen (wird per JS befüllt) ─── -->
<div id="multi-view"></div>

<script>
  (function() {
    var tpl = document.getElementById('card-template').innerHTML;

    // Einzelansicht
    document.getElementById('single-view').innerHTML = tpl;

    // 9er-Bogen
    var mw = document.getElementById('multi-view');
    for (var i = 0; i < 9; i++) {
      mw.innerHTML += tpl;
    }
  })();
</script>

</body>
</html>
